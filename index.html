<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>척수 상행로 및 통증 기전</title>
    <!-- Tailwind CSS (디자인 프레임워크) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (아이콘) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Pretendard Font (한글 폰트) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable.css" />
    <style>
        body { font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif; background-color: #f8fafc; }
        .option-btn { transition: all 0.2s ease-in-out; }
        .option-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 동적 스타일링 클래스 */
        .btn-default { border-color: #e2e8f0; background-color: #ffffff; color: #334155; cursor: pointer; }
        .btn-default:hover { border-color: #93c5fd; background-color: #eff6ff; }
        .btn-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; cursor: default; }
        .btn-incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; cursor: default; }
        .btn-disabled { border-color: #e2e8f0; color: #94a3b8; opacity: 0.6; cursor: default; }
        
        .icon-default { background-color: #f1f5f9; color: #64748b; }
        .icon-correct { background-color: #bbf7d0; color: #15803d; }
        .icon-incorrect { background-color: #fecaca; color: #b91c1c; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-900 text-white shadow-md py-6 px-4 shrink-0">
        <div class="max-w-3xl mx-auto flex items-center gap-4">
            <i class="fa-solid fa-brain text-4xl text-blue-300"></i>
            <div>
                <h1 class="text-2xl font-bold tracking-tight">척수 상행로 및 통증 기전</h1>
                <p class="text-blue-200 text-sm mt-1">안산대학교 물리치료학과 심경섭 교수</p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4 sm:p-6">
        
        <!-- Quiz App Container -->
        <div id="quiz-app" class="max-w-3xl w-full bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden fade-in">
            <!-- Progress Bar -->
            <div class="w-full bg-slate-100 h-2">
                <div id="progress-bar" class="bg-blue-600 h-2 transition-all duration-300" style="width: 0%"></div>
            </div>

            <div class="p-6 sm:p-8">
                <!-- Question Header -->
                <div class="mb-6">
                    <div class="flex justify-between items-end mb-4">
                        <span id="question-counter" class="text-sm font-bold text-blue-600 uppercase tracking-wider bg-blue-50 px-3 py-1 rounded-full">
                            Question 1 / 10
                        </span>
                        <button id="hint-toggle-btn" class="text-amber-500 hover:text-amber-600 text-sm font-medium transition-colors flex items-center gap-1.5" onclick="toggleHint()">
                            <i class="fa-solid fa-lightbulb"></i> 힌트 보기
                        </button>
                    </div>
                    
                    <h2 id="question-text" class="text-xl sm:text-2xl font-bold text-slate-900 leading-snug">
                        질문이 여기에 표시됩니다.
                    </h2>
                    
                    <!-- Hint Box -->
                    <div id="hint-box" class="hidden mt-4 p-4 bg-amber-50 border border-amber-200 rounded-lg text-amber-800 text-sm fade-in">
                        <strong class="flex items-center gap-1.5 mb-1">
                            <i class="fa-solid fa-key"></i> 임상 힌트:
                        </strong>
                        <span id="hint-text" class="leading-relaxed"></span>
                    </div>
                </div>

                <!-- Options -->
                <div id="options-container" class="space-y-3">
                    <!-- Options injected by JS -->
                </div>

                <!-- Rationale Section -->
                <div id="rationale-container" class="hidden mt-6 p-5 rounded-xl border fade-in">
                    <h3 id="rationale-title" class="font-bold text-lg mb-2 flex items-center gap-2"></h3>
                    <p id="rationale-text" class="text-slate-700 leading-relaxed"></p>
                </div>

                <!-- Controls -->
                <div id="controls-container" class="hidden mt-8 flex justify-end fade-in">
                    <button id="next-btn" onclick="handleNext()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2">
                        다음 문제 <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden max-w-2xl w-full bg-white rounded-2xl shadow-xl border border-slate-200 p-8 text-center fade-in">
            <div class="w-24 h-24 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-5xl mx-auto mb-6">
                <i class="fa-solid fa-award"></i>
            </div>
            <h2 class="text-3xl font-bold text-slate-900 mb-2">학습 완료!</h2>
            <p class="text-slate-600 mb-8">모든 퀴즈를 성공적으로 마쳤습니다.</p>
            
            <div class="bg-slate-50 rounded-xl p-6 mb-8 border border-slate-100 inline-block min-w-[250px]">
                <div class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-1">최종 점수</div>
                <div class="text-5xl font-black text-blue-600">
                    <span id="final-score">0</span><span class="text-2xl text-slate-400 font-medium"> / 10</span>
                </div>
            </div>

            <div>
                <button onclick="restartQuiz()" class="bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 px-8 rounded-xl shadow-md transition-colors inline-flex items-center gap-2">
                    <i class="fa-solid fa-rotate-right"></i> 퀴즈 다시 풀기
                </button>
            </div>
        </div>

    </main>

    <footer class="bg-slate-900 py-6 text-center shrink-0">
        <p class="text-slate-400 text-sm">© Ansan University, Dept. of Physical Therapy. Prof. Sim Gyeongseop.</p>
    </footer>

    <script>
        const quizData = [
            {
                "question": "뒤척수소뇌로(DSCT)와 앞척수소뇌로(ASCT)가 소뇌로 전달하는 정보의 성격 차이를 가장 잘 설명한 것은?",
                "answerOptions": [
                    { "text": "DSCT는 근육의 실제 수축 상태를, ASCT는 척수에 내려진 운동 명령의 복사본(Efference copy)을 전달한다.", "isCorrect": true, "rationale": "DSCT는 근방추와 골지힘줄기관을 통해 근육의 상태를 1:1로 보고하며, ASCT는 척수 내 개재뉴런의 상태를 통해 '운동 명령 진행 상황'을 내부 피드백으로 제공합니다." },
                    { "text": "DSCT는 대뇌 겉질(Cortex)의 하행성 운동 계획을, ASCT는 말초 관절의 순수 위치 감각을 전달한다.", "isCorrect": false, "rationale": "대뇌 겉질의 하행성 운동 계획(복사본)과 척수의 내부 상황을 전달하는 것은 DSCT가 아니라 ASCT의 역할입니다." },
                    { "text": "DSCT는 상지와 상부 체간의 운동 상태를, ASCT는 하지와 하부 체간의 운동 상태를 전달한다.", "isCorrect": false, "rationale": "DSCT와 ASCT 모두 주로 하지와 하부 체간의 고유수용성감각을 담당하며, 상지/하지로 두 경로의 본질적 기능이 나뉘지 않습니다." },
                    { "text": "DSCT는 척수의 운동 명령을, ASCT는 개별 근육의 미세한 장력 변화를 직접 전달한다.", "isCorrect": false, "rationale": "두 경로의 역할이 반대로 설명되어 있습니다. 개별 근육의 미세한 상태는 DSCT가, 척수의 운동 명령 복사본은 ASCT가 보고합니다." }
                ],
                "hint": "두 경로 중 하나는 '운동의 실제 결과'를 보고하고, 다른 하나는 척수 내 '운동 명령의 처리 과정'을 보고합니다."
            },
            {
                "question": "앞척수소뇌로(ASCT)의 해부학적 상행 주행 경로에 대한 설명으로 옳은 것은?",
                "answerOptions": [
                    { "text": "척수에서 한 번 교차하여 올라간 후, 소뇌 진입 직후 다시 교차하여 최종적으로 동측 소뇌로 들어간다.", "isCorrect": true, "rationale": "ASCT는 백색앞맞교차(Anterior White Commissure)를 통해 반대측으로 상행(1차 교차)한 뒤, 위소뇌다리로 진입하며 소뇌 백색질 내에서 다시 동측으로 넘어오는 이중 교차(Double crossed)를 합니다." },
                    { "text": "척수 진입 직후 교차하지 않고 동측으로만 상행하여 아래소뇌다리(ICP)로 들어간다.", "isCorrect": false, "rationale": "이는 앞척수소뇌로(ASCT)가 아닌 뒤척수소뇌로(DSCT)의 주행 경로에 대한 설명입니다." },
                    { "text": "숨뇌(Medulla)에서 한 번만 교차하여 반대측 소뇌 겉질(Cortex)로 들어가 기능을 지배한다.", "isCorrect": false, "rationale": "척수소뇌로는 궁극적으로 반대측이 아닌 동측(Ipsilateral) 지배를 원칙으로 하며, 숨뇌(Medulla)에서 교차하는 것은 DCML 경로의 특징입니다." },
                    { "text": "백색앞맞교차(Anterior White Commissure)를 통해 반대측으로 넘어간 후 다시 교차하지 않고 반대측 소뇌로 들어간다.", "isCorrect": false, "rationale": "ASCT는 척수에서 한 번 교차한 후 소뇌에서 다시 원래 쪽으로 넘어오기 때문에 최종적으로 동측을 지배합니다." }
                ],
                "hint": "ASCT는 해부학적으로 '지그재그' 형태의 특이한 교차 방식을 보이지만, 결과적인 기능 지배는 시작점과 같은 방향을 유지합니다."
            },
            {
                "question": "피부 기계수용기 중 털의 움직임을 감지하며, 신경계가 병적인 상태가 되었을 때 동적 기계적 이질통(Dynamic Mechanical Allodynia)의 주된 유발원이 되는 수용기는?",
                "answerOptions": [
                    { "text": "모낭수용기 (Hair follicle receptor)", "isCorrect": true, "rationale": "모낭수용기는 평소 털의 가벼운 움직임을 감지하지만, 중추감작 시 $A\\beta$ 섬유를 통해 통증 경로(WDR 뉴런)를 오인 자극하여 스치는 자극에도 심한 통증을 유발합니다." },
                    { "text": "마이스너 소체 (Meissner corpuscle)", "isCorrect": false, "rationale": "마이스너 소체는 털이 없는 피부(Glabrous skin)에 주로 분포하여 저주파 진동을 감지하며, 털이 있는 피부에서의 이질통 기전과는 거리가 멉니다." },
                    { "text": "파치니 소체 (Pacinian corpuscle)", "isCorrect": false, "rationale": "파치니 소체는 깊은 압력과 고주파 진동을 감지하는 빠른 적응 수용기로, 표면의 미세한 스침으로 인한 이질통의 주 유발원은 아닙니다." },
                    { "text": "자유신경종말 (Free nerve ending)", "isCorrect": false, "rationale": "자유신경종말은 본래 통각과 온도각을 전달하는 수용기로, 가벼운 털의 접촉(역동적 자극)에 의한 이질통을 '트리거'하는 일차적 구조물이라기보다 병적 자발통의 원인에 더 가깝습니다." }
                ],
                "hint": "환자가 '옷깃만 스쳐도 불타는 듯이 아프다'고 할 때 직접적으로 자극받는 복합 구조물입니다."
            },
            {
                "question": "복합부위통증증후군(CRPS) 환자에게서 이질통이 발생하는 신경생리학적 '탈억제(Disinhibition)' 기전으로 가장 적절한 것은?",
                "answerOptions": [
                    { "text": "아교질(SG)의 억제성 개재뉴런이 기능을 상실하여, 촉각을 전달하는 $A\\beta$ 섬유가 통증 투사 뉴런(WDR)을 직접 흥분시킨다.", "isCorrect": true, "rationale": "정상적인 관문을 형성하던 억제성 개재뉴런이 고장 나면서, $A\\beta$의 무해한 촉각 신호가 제어 없이 통증 경로인 광범위 역동 뉴런(WDR)을 폭발적으로 흥분시키게 됩니다." },
                    { "text": "$A\\delta$ 섬유와 $C$ 섬유가 아교질의 억제성 개재뉴런을 강하게 흥분시켜 통증 경로를 더욱 활성화한다.", "isCorrect": false, "rationale": "유해 자극 섬유인 $A\\delta$와 $C$ 섬유는 억제성 개재뉴런을 흥분시키는 것이 아니라 억제(차단)하여 통증의 문을 엽니다." },
                    { "text": "통각 수용기들이 완전히 사멸하여, 피부의 메르켈 원반이 척수시상로로 들어가 직접 통각을 분비한다.", "isCorrect": false, "rationale": "CRPS는 수용기 자체가 사멸해서 통증이 생기는 것이 아니라, 신경계 내의 감작(Sensitization)과 해부학적 재배선(혼선)에 의해 발생합니다." },
                    { "text": "$A\\beta$ 섬유가 뒷기둥(DC)을 이탈하여 리사우어로(Lissauer's tract)를 통해 반대측 척수시상로로 교차해 들어간다.", "isCorrect": false, "rationale": "$A\\beta$ 섬유는 리사우어로를 경유하지 않으며, 이질통 기전은 뒷기둥 이탈이 아닌 뒤뿔로 뻗은 측부 가지의 비정상적 시냅스 형성과 억제 상실 때문입니다." }
                ],
                "hint": "관문조절설(Gate Control Theory)에서 문을 닫아주던 문지기(경찰)가 사라진 무법지대 상황을 떠올려 보세요."
            },
            {
                "question": "굵고 빠른 몸감각(Somatosensory) 섬유($Ia, Ib, II, A\\beta$)가 말초에서 척수로 진입하여 뇌를 향해 상행하는 방식으로 옳은 것은?",
                "answerOptions": [
                    { "text": "뒤뿌리 진입부(Dorsal Root Entry Zone, DREZ)의 내측 다발로 들어와 척수 뒤뿔을 거치지 않고 곧바로 뒤기둥(Dorsal Column)으로 진입한다.", "isCorrect": true, "rationale": "분별성 촉각 및 의식적 고유수용성감각을 담당하는 굵은 VIP 섬유들은 척수 바깥쪽 샛길인 리사우어로를 타지 않고 DREZ 내측을 통해 즉시 뒤기둥 백색질 고속도로에 합류합니다." },
                    { "text": "리사우어로를 타고 1~2분절 상하행한 후 척수 뒤뿔의 아교질(SG) 얕은 층에서 연접한다.", "isCorrect": false, "rationale": "이는 굵은 섬유가 아닌 통각과 온도각을 전달하는 가는 섬유($A\\delta, C$)의 전형적인 진입 경로입니다." },
                    { "text": "진입 즉시 백색앞맞교차(Anterior White Commissure)를 통해 척수 반대측 뒤기둥으로 교차하여 상행한다.", "isCorrect": false, "rationale": "뒤기둥(Dorsal Column) 경로는 척수가 아닌 숨뇌(Medulla)의 뒤기둥핵에서 시냅스한 후 교차하므로, 진입 즉시 척수 내 교차는 일어나지 않습니다." },
                    { "text": "뒤뿌리 진입부(Dorsal Root Entry Zone, DREZ)의 외측 다발을 통해 들어와 척수시상로(Spinothalamic Tract) 통로로 직접 합류한다.", "isCorrect": false, "rationale": "외측 다발은 가는 섬유의 진입로이며, 굵은 섬유가 척수시상로(Spinothalamic Tract)로 향하는 것은 정상적인 생리적 경로가 아닙니다." }
                ],
                "hint": "이 굵은 신경 섬유들은 시냅스 없이 숨뇌(Medulla)까지 가장 빠르게 이동하기 위해 척수 내부 회색질을 우회합니다."
            },
            {
                "question": "학술적 관점에서 본 리사우어로(Lissauer's tract)의 신경섬유 구성에 대한 설명으로 가장 정확한 것은?",
                "answerOptions": [
                    { "text": "$A\\delta, C$ 섬유뿐만 아니라 척수 분절 간 신호를 통합하는 고유척수섬유(Propriospinal fibers)가 함께 섞여 있다.", "isCorrect": true, "rationale": "리사우어로는 외부 구심성 통증 섬유와 인접한 척수 분절들을 연결하여 방어 반사와 통증의 다분절 통합을 돕는 내인성 고유척수섬유로 구성된 신경망입니다." },
                    { "text": "오직 외부에서 들어온 $A\\delta$와 $C$ 섬유만으로 구성된 통각 전용 순수 통로이다.", "isCorrect": false, "rationale": "전통적 교재에서는 그렇게 단순화하기도 하나, 심화 해부학적으로는 내인성 섬유인 고유척수섬유가 상당 비율을 차지하고 있습니다." },
                    { "text": "굵은 $A\\beta$ 섬유가 뒷기둥으로 들어가기 위해 반드시 거쳐야 하는 척수 외곽의 샛길이다.", "isCorrect": false, "rationale": "$A\\beta$ 섬유는 리사우어로를 거치지 않고 내측 다발을 통해 직접 뒤기둥으로 진입합니다." },
                    { "text": "하행성 운동 명령이 척수 앞뿔세포로 전달되기 직전에 거치는 고유 운동 신경 다발이다.", "isCorrect": false, "rationale": "리사우어로는 척수 뒤뿔 바깥쪽에 위치한 감각 통합 다발이며 하행성 운동 경로와는 관련이 없습니다." }
                ],
                "hint": "유해 자극이 들어왔을 때 통증 정보가 단일 척수 분절에 머물지 않고 주변으로 확산, 통합될 수 있는 해부학적 근거가 포함되어 있습니다."
            },
            {
                "question": "말초에서 들어온 통각 및 온도각 정보가 척수 내에서 반대측으로 교차하는 과정에 대한 설명으로 옳은 것은?",
                "answerOptions": [
                    { "text": "동측 뒤뿔에서 연접을 마친 투사 뉴런(2차 뉴런)의 축삭이 백색앞맞교차(Anterior White Commissure)를 통해 반대측으로 넘어간다.", "isCorrect": true, "rationale": "척수시상로의 교차는 1차 구심성 뉴런이 아니라 척수 뒤뿔에서 시냅스를 한 뒤 발생한 2차 뉴런의 축삭이 중심관 앞의 백색앞맞교차(Anterior White Commissure, AWC)를 가로지르며 일어납니다." },
                    { "text": "말초 수용기에서 온 1차 뉴런($A\\delta, C$ 섬유)이 척수에 진입하자마자 연접 없이 반대측으로 직접 넘어간다.", "isCorrect": false, "rationale": "1차 뉴런은 척수 반대편으로 교차하지 않으며, 반드시 동측의 뒤뿔에서 시냅스(연접)를 거칩니다." },
                    { "text": "아교질(SG) 내에 위치한 억제성 개재뉴런 자체가 반대측으로 건너가 척수시상로를 형성한다.", "isCorrect": false, "rationale": "개재뉴런은 국소적인 척수 분절 내에서만 신호를 변조할 뿐 반대측으로 상행하는 투사로를 형성하지 않습니다." },
                    { "text": "척수에서는 전혀 교차하지 않고 동측의 척수시상로(Spinothalamic Tract)를 타고 상행하다가 숨뇌(Medulla)에서 일괄 교차한다.", "isCorrect": false, "rationale": "숨뇌(Medulla)에서 교차하는 것은 DCML 경로(분별성 촉각, 고유수용성감각)이며, 척수시상로는 척수 분절 단위에서 즉시 교차합니다." }
                ],
                "hint": "통증 경로에서 정중선을 건너 반대측으로 가는 '실제 다리' 역할을 하는 구조물은 첫 번째 신경세포가 아닙니다."
            },
            {
                "question": "척수소뇌로(ASCT 또는 DSCT)가 척수 수준에서 단측 손상되었을 때 나타나는 소뇌성 운동실조(Cerebellar Ataxia)의 증상 발현 위치로 옳은 것은?",
                "answerOptions": [
                    { "text": "손상된 척수 병변과 같은 쪽(Ipsilateral)에 운동실조가 나타난다.", "isCorrect": true, "rationale": "DSCT는 동측으로 직행하고, ASCT는 척수에서 한 번, 소뇌에서 한 번 다시 교차하는 이중 교차를 거치므로 두 경로 모두 결과적으로 동측의 운동을 조절하여 병변과 동측에 증상이 나타납니다." },
                    { "text": "손상된 척수 병변과 반대 쪽(Contralateral)에 운동실조가 나타난다.", "isCorrect": false, "rationale": "척수소뇌로 시스템은 대뇌겉질-척수로(Corticospinal tract)와 달리 해부학적으로 결국 동측(Ipsilateral) 지배를 원칙으로 합니다." },
                    { "text": "상지에는 병변 동측에, 하지에는 병변 반대측에 교차성으로 운동실조가 나타난다.", "isCorrect": false, "rationale": "소뇌성 증상은 상하지를 불문하고 병변과 같은 쪽에 나타납니다." },
                    { "text": "병변의 위치와 무관하게 양측(Bilateral)에 대칭적인 운동실조가 발생한다.", "isCorrect": false, "rationale": "단측성 병변의 경우 전신 대칭적 증상이 아닌 병변 동측에 국한된 조화운동불능(Incoordination)이 유발됩니다." }
                ],
                "hint": "비록 ASCT가 척수 내에서 한 번 교차해 올라가지만, 소뇌에 들어가기 직전의 경로를 다시 생각해 보세요."
            },
            {
                "question": "피부 기계수용기에서 감지된 비분별적 감각 중, '무언가 닿았다'는 정도만 인지하는 조잡촉각(Crude Touch) 정보가 뇌로 주로 상행하는 경로는?",
                "answerOptions": [
                    { "text": "앞척수시상로 (Anterior Spinothalamic Tract, ASTT)", "isCorrect": true, "rationale": "정교한 모양이나 질감을 알기 어려운 조잡한 촉각 정보는 주로 자유신경종말 등에서 시작되어 $A\\delta$ 섬유를 타고 앞척수시상로(ASTT)를 통해 전달됩니다." },
                    { "text": "뒤기둥-안쪽섬유띠계 (DCML)", "isCorrect": false, "rationale": "DCML은 조잡촉각이 아닌 물체의 크기, 모양, 위치를 정확히 판별하는 분별성 촉각(Discriminative touch)을 담당합니다." },
                    { "text": "뒤척수소뇌로 (DSCT)", "isCorrect": false, "rationale": "척수소뇌로는 의식되지 않는 무의식적 고유수용성감각(관절 위치, 근육 장력)을 소뇌로 전달하며 피부 촉각을 뇌로 올리지 않습니다." },
                    { "text": "가쪽겉질척수로 (Lateral Corticospinal Tract, LCST)", "isCorrect": false, "rationale": "가쪽겉질척수로는 감각 상행로가 아니라, 대뇌에서 척수로 내려가는 수의적 운동 명령 하행로입니다." }
                ],
                "hint": "이 경로는 위치에 대한 정밀한 분석보다는 외부 자극의 '존재 여부나 위협'을 감지하는 비교적 원시적인 정보 시스템의 일부입니다."
            },
            {
                "question": "CRPS 상태에서 발생하는 구조적 재배선 현상인 '신경섬유의 발아(A-fiber Sprouting)'에 대한 설명으로 옳은 것은?",
                "answerOptions": [
                    { "text": "깊은 층에 있던 $A\\beta$ 섬유가 통각 전용 구역인 척수 뒤뿔 얕은 층(Lamina II)으로 가지를 뻗어 통각 뉴런과 직접 시냅스를 형성한다.", "isCorrect": true, "rationale": "만성 염증 등으로 인해 분별성 촉각을 담당하던 굵은 $A\\beta$ 섬유가 통증 구역으로 물리적으로 자라 들어가(Sprouting), 만지는 자극을 통증으로 해석하게 만드는 결정적 해부학적 교차 혼선(Crosstalk) 현상입니다." },
                    { "text": "통각을 전달하는 $A\\delta$ 섬유가 뒷기둥(Dorsal Column)으로 자라 들어가 정상적인 분별성 촉각 상행을 물리적으로 차단한다.", "isCorrect": false, "rationale": "통각 섬유가 촉각 경로로 침범하는 것이 아니라, 촉각 섬유($A\\beta$)가 통각 경로(Lamina II) 쪽으로 침범하는 기전이 이질통 발아(Sprouting)의 핵심입니다." },
                    { "text": "자유신경종말이 피부 표면에서 완전히 소실되고 모낭수용기가 통각 센서의 자리를 100% 대체한다.", "isCorrect": false, "rationale": "말초 수용기의 소실이나 대체의 문제가 아니라, 중추신경계(척수 뒤뿔) 내부 시냅스의 비정상적인 구조 변화입니다." },
                    { "text": "교감신경 말단의 수용체가 퇴화하여, 어떠한 물리적 자극에도 노르에피네프린 매개 통증 신호가 영구적으로 생성되지 않는다.", "isCorrect": false, "rationale": "CRPS는 오히려 감각 신경 표면에 알파-아드레날린 수용체가 비정상적으로 생성되어 교감신경계 물질에 과민 반응(Coupling)을 일으킵니다." }
                ],
                "hint": "원래 정교한 촉각을 다루며 뒤뿔의 안쪽 층에 자리 잡고 있던 굵은 시민 섬유가, 선을 넘어 도둑의 구역으로 물리적인 다리를 놓는 현상입니다."
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let isAnswered = false;
        let showHintStatus = false;
        let shuffledOptions = [];
        let selectedOptionIndex = null;

        // MathJax 텍스트 변환기 ($A\beta$ -> Aβ)
        const formatText = (text) => {
            if (!text) return "";
            return text.replace(/\$([^\$]+)\$/g, (match, p1) => {
                return p1.replace('\\beta', 'β').replace('\\delta', 'δ');
            });
        };

        // 배열 셔플 함수
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 초기 화면 로드
        function loadQuestion() {
            const currentQ = quizData[currentQuestionIndex];
            isAnswered = false;
            showHintStatus = false;
            selectedOptionIndex = null;

            // UI 요소 가져오기
            const progressBar = document.getElementById('progress-bar');
            const qCounter = document.getElementById('question-counter');
            const qText = document.getElementById('question-text');
            const hintBtn = document.getElementById('hint-toggle-btn');
            const hintBox = document.getElementById('hint-box');
            const optionsContainer = document.getElementById('options-container');
            const rationaleContainer = document.getElementById('rationale-container');
            const controlsContainer = document.getElementById('controls-container');

            // 진행률 및 텍스트 업데이트
            progressBar.style.width = `${(currentQuestionIndex / quizData.length) * 100}%`;
            qCounter.innerText = `Question ${currentQuestionIndex + 1} / ${quizData.length}`;
            qText.innerText = formatText(currentQ.question);

            // 힌트 처리
            if (currentQ.hint) {
                hintBtn.classList.remove('hidden');
                document.getElementById('hint-text').innerText = formatText(currentQ.hint);
            } else {
                hintBtn.classList.add('hidden');
            }
            hintBox.classList.add('hidden');
            rationaleContainer.classList.add('hidden');
            controlsContainer.classList.add('hidden');

            // 옵션 셔플 및 렌더링
            shuffledOptions = shuffleArray(currentQ.answerOptions);
            optionsContainer.innerHTML = '';

            shuffledOptions.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = `option-btn btn-default w-full text-left p-4 rounded-xl border-2 font-medium flex items-start`;
                
                const charCode = String.fromCharCode(65 + idx);
                btn.innerHTML = `
                    <span class="icon-default inline-flex w-6 h-6 rounded-full items-center justify-center text-sm mr-3 font-bold shrink-0 mt-0.5">
                        ${charCode}
                    </span>
                    <span class="leading-relaxed flex-1">${formatText(opt.text)}</span>
                `;
                
                btn.onclick = () => selectOption(idx, opt);
                optionsContainer.appendChild(btn);
            });
        }

        function toggleHint() {
            showHintStatus = !showHintStatus;
            const hintBox = document.getElementById('hint-box');
            if (showHintStatus) {
                hintBox.classList.remove('hidden');
            } else {
                hintBox.classList.add('hidden');
            }
        }

        function selectOption(index, optionData) {
            if (isAnswered) return;
            isAnswered = true;
            selectedOptionIndex = index;

            // 힌트 가리기
            document.getElementById('hint-box').classList.add('hidden');
            document.getElementById('hint-toggle-btn').classList.add('hidden');

            const optionButtons = document.getElementById('options-container').children;

            // 점수 증가 및 스타일 처리
            if (optionData.isCorrect) {
                score++;
            }

            for (let i = 0; i < optionButtons.length; i++) {
                const btn = optionButtons[i];
                const optData = shuffledOptions[i];
                const iconSpan = btn.querySelector('span');
                
                // 기본 스타일 리셋
                btn.className = 'w-full text-left p-4 rounded-xl border-2 font-medium flex items-start transition-all duration-200 ';
                
                if (optData.isCorrect) {
                    btn.classList.add('btn-correct');
                    iconSpan.className = 'icon-correct inline-flex w-6 h-6 rounded-full items-center justify-center text-sm mr-3 font-bold shrink-0 mt-0.5';
                    iconSpan.innerHTML = '<i class="fa-solid fa-check text-sm"></i>';
                } else if (i === selectedOptionIndex && !optData.isCorrect) {
                    btn.classList.add('btn-incorrect');
                    iconSpan.className = 'icon-incorrect inline-flex w-6 h-6 rounded-full items-center justify-center text-sm mr-3 font-bold shrink-0 mt-0.5';
                    iconSpan.innerHTML = '<i class="fa-solid fa-xmark text-sm"></i>';
                } else {
                    btn.classList.add('btn-disabled');
                }
            }

            // 해설창 표시
            const rationaleContainer = document.getElementById('rationale-container');
            const rationaleTitle = document.getElementById('rationale-title');
            const rationaleText = document.getElementById('rationale-text');

            rationaleContainer.className = `mt-6 p-5 rounded-xl border fade-in ${optionData.isCorrect ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50'}`;
            rationaleTitle.className = `font-bold text-lg mb-2 flex items-center gap-2 ${optionData.isCorrect ? 'text-green-800' : 'text-red-800'}`;
            
            if (optionData.isCorrect) {
                rationaleTitle.innerHTML = '<i class="fa-solid fa-circle-check text-green-600 text-xl"></i> 정답입니다!';
            } else {
                rationaleTitle.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-600 text-xl"></i> 오답입니다.';
            }
            
            rationaleText.innerHTML = formatText(optionData.rationale);
            rationaleContainer.classList.remove('hidden');

            // 컨트롤 버튼 표시
            const controlsContainer = document.getElementById('controls-container');
            const nextBtn = document.getElementById('next-btn');
            
            if (currentQuestionIndex === quizData.length - 1) {
                nextBtn.innerHTML = '결과 보기 <i class="fa-solid fa-award"></i>';
            } else {
                nextBtn.innerHTML = '다음 문제 <i class="fa-solid fa-arrow-right"></i>';
            }
            controlsContainer.classList.remove('hidden');
        }

        function handleNext() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-app').classList.add('hidden');
            const resultScreen = document.getElementById('result-screen');
            resultScreen.classList.remove('hidden');
            
            // 카운팅 애니메이션 효과
            let currentScore = 0;
            const scoreElement = document.getElementById('final-score');
            const interval = setInterval(() => {
                if (currentScore >= score) {
                    clearInterval(interval);
                    scoreElement.innerText = score;
                } else {
                    currentScore++;
                    scoreElement.innerText = currentScore;
                }
            }, 100);
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-app').classList.remove('hidden');
            loadQuestion();
        }

        // 앱 초기화
        window.onload = loadQuestion;
    </script>
</body>
</html>
